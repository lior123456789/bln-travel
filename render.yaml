services:
  - type: web
    name: bln-travel
    runtime: static
    buildCommand: ""
    staticPublishPath: ./
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    # Multi-page static site — let Render serve each .html directly.
    # (No global rewrite to index.html, otherwise /story.html etc. would 404.)
